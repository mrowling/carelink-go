run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  enable:
    - errcheck       # Check for unchecked errors
    - govet          # Reports suspicious constructs  
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Static analysis checks
    - unused         # Check for unused constants, variables, functions and types
    - gosec          # Security issues
    - errorlint      # Find code that will cause problems with Go 1.13+ error wrapping

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false  # Allow _ = for intentional ignores
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*database/sql.Stmt).Close
      - (*database/sql.Tx).Rollback
      - (net/http.ResponseBody).Close

  govet:
    enable:
      - shadow
    disable:
      - fieldalignment  # Disable field alignment for now

  gosec:
    excludes:
      - G301  # Directory permissions
      - G304  # File path from variable (we validate paths)

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - unnamedResult
      - hugeParam

  revive:
    rules:
      - name: exported
        disabled: false
        arguments:
          - checkPrivateReceivers
          - disableStutteringCheck

issues:
  exclude-use-default: false
  exclude-dirs:
    - vendor
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  
  # Exclude some linters from running on tests files
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        - funlen
    
    # Ignore shadowing of err
    - linters:
        - govet
      text: 'declaration of "(err|ctx)"'
    
    # Ignore certain staticcheck messages
    - linters:
        - staticcheck
      text: "SA1019:"
